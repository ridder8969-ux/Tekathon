<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Players - Tekathon</title>
<link rel="stylesheet" href="./assets/styles/design-system.css">
<style>
.search-hero {
  padding: var(--space-3xl) 0 var(--space-2xl);
  text-align: center;
}

.search-container {
  max-width: 700px;
  margin: 0 auto var(--space-3xl);
}

.search-box {
  position: relative;
}

.search-input {
  width: 100%;
  padding: 20px 24px 20px 60px;
  font-size: var(--text-lg);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  color: var(--text-primary);
  transition: all var(--transition-base);
}

.search-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px var(--primary-glow), var(--shadow-lg);
}

.search-icon {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: var(--text-xl);
}

.search-results {
  position: absolute;
  top: calc(100% + var(--space-sm));
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  max-height: 500px;
  overflow-y: auto;
  z-index: var(--z-dropdown);
}

.search-result-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.search-result-item:last-child {
  border-bottom: none;
}

.search-result-item:hover {
  background: var(--surface-hover);
}

.search-result-avatar {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-extrabold);
  font-size: var(--text-xl);
  flex-shrink: 0;
}

.search-result-info {
  flex: 1;
  min-width: 0;
}

.search-result-name {
  font-weight: var(--font-bold);
  font-size: var(--text-lg);
  margin-bottom: 4px;
}

.search-result-meta {
  display: flex;
  gap: var(--space-md);
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.search-result-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--primary-glow);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: var(--font-semibold);
  color: var(--primary-light);
}

.popular-searches {
  margin-top: var(--space-xl);
}

.popular-title {
  font-size: var(--text-sm);
  font-weight: var(--font-semibold);
  color: var(--text-secondary);
  margin-bottom: var(--space-md);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.popular-tags {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.popular-tag {
  padding: var(--space-sm) var(--space-md);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.popular-tag:hover {
  background: var(--surface-hover);
  border-color: var(--primary);
  color: var(--primary);
}

.recent-searches-section {
  padding: var(--space-2xl) 0;
}

.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--space-lg);
}

.player-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  cursor: pointer;
  transition: all var(--transition-base);
}

.player-card:hover {
  transform: translateY(-4px);
  border-color: var(--primary);
  box-shadow: var(--shadow-lg);
}

.player-card-header {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.player-card-avatar {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-extrabold);
  font-size: var(--text-2xl);
  flex-shrink: 0;
}

.player-card-info {
  flex: 1;
  min-width: 0;
}

.player-card-name {
  font-weight: var(--font-bold);
  font-size: var(--text-xl);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.player-card-rank {
  color: var(--primary);
  font-weight: var(--font-semibold);
  font-size: var(--text-sm);
}

.player-card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-md);
}

.player-card-stat {
  text-align: center;
}

.player-card-stat-value {
  font-weight: var(--font-bold);
  font-size: var(--text-lg);
  color: var(--primary);
  margin-bottom: 4px;
}

.player-card-stat-label {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.empty-state {
  text-align: center;
  padding: var(--space-3xl) var(--space-lg);
}

.empty-icon {
  font-size: 64px;
  opacity: 0.3;
  margin-bottom: var(--space-lg);
}

.empty-title {
  font-size: var(--text-2xl);
  font-weight: var(--font-bold);
  margin-bottom: var(--space-sm);
}

.empty-description {
  color: var(--text-secondary);
  margin-bottom: var(--space-lg);
}

@media (max-width: 640px) {
  .search-input {
    padding: 16px 20px 16px 56px;
    font-size: var(--text-base);
  }
  .search-result-meta {
    flex-direction: column;
    gap: 4px;
  }
  .players-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<!-- Navigation (same as homepage) -->
<nav class="nav">
  <div class="container nav-container">
    <a href="./index-v2.html" class="nav-logo">
      <div class="nav-logo-icon">T</div>
      <span>Tekathon</span>
    </a>
    <div class="nav-links">
      <a href="./index-v2.html" class="nav-link">Home</a>
      <a href="./search-v2.html" class="nav-link active">Search</a>
      <a href="./leaderboard-v2.html" class="nav-link">Leaderboards</a>
      <a href="./analytics-v2.html" class="nav-link">Analytics</a>
    </div>
  </div>
</nav>

<!-- Search Hero -->
<section class="search-hero">
  <div class="container">
    <h1 class="hero-title" style="margin-bottom: var(--space-md);">Find Players</h1>
    <p class="hero-description" style="margin-bottom: var(--space-2xl);">
      Search for any TEKKEN 8 player by username or Polaris ID
    </p>

    <div class="search-container">
      <div class="search-box">
        <div class="search-icon">🔍</div>
        <input 
          type="text" 
          class="search-input" 
          placeholder="Enter player name or ID..."
          id="searchInput"
          autocomplete="off"
        />
        <div class="search-results" id="searchResults" style="display: none;"></div>
      </div>

      <div class="popular-searches">
        <div class="popular-title">Popular Searches</div>
        <div class="popular-tags">
          <div class="popular-tag" onclick="searchPlayer('Arslan Ash')">Arslan Ash</div>
          <div class="popular-tag" onclick="searchPlayer('KNEE')">KNEE</div>
          <div class="popular-tag" onclick="searchPlayer('Chikurin')">Chikurin</div>
          <div class="popular-tag" onclick="searchPlayer('Atif Butt')">Atif Butt</div>
          <div class="popular-tag" onclick="searchPlayer('Ulsan')">Ulsan</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Recent / Popular Players -->
<section class="recent-searches-section">
  <div class="container">
    <div class="section-header">
      <div>
        <h2 class="section-title">Top Players</h2>
        <p class="section-subtitle">Explore profiles of the best TEKKEN 8 players</p>
      </div>
    </div>

    <div id="playersContainer" class="players-grid">
      <!-- Loading skeletons -->
      <div class="player-card">
        <div class="player-card-header">
          <div class="skeleton" style="width: 64px; height: 64px; border-radius: var(--radius-lg);"></div>
          <div style="flex: 1;">
            <div class="skeleton" style="width: 60%; height: 24px; margin-bottom: 8px;"></div>
            <div class="skeleton" style="width: 40%; height: 16px;"></div>
          </div>
        </div>
        <div class="skeleton" style="width: 100%; height: 60px;"></div>
      </div>
    </div>
  </div>
</section>

<script>
const EWGF_API = 'https://www.ewgf.gg/api';
let searchTimeout;

// Search input handler
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', (e) => {
  const query = e.target.value.trim();
  
  clearTimeout(searchTimeout);
  
  if (query.length < 2) {
    searchResults.style.display = 'none';
    return;
  }
  
  searchResults.innerHTML = '<div style="padding: var(--space-lg); text-align: center; color: var(--text-secondary);">Searching...</div>';
  searchResults.style.display = 'block';
  
  searchTimeout = setTimeout(() => performSearch(query), 300);
});

async function performSearch(query) {
  try {
    const response = await fetch(`${EWGF_API}/search?q=${encodeURIComponent(query)}`);
    const data = await response.json();
    
    if (data && data.data && data.data.length > 0) {
      displaySearchResults(data.data);
    } else {
      searchResults.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">No players found</div>
          <div class="empty-description">Try a different search term</div>
        </div>
      `;
    }
  } catch (error) {
    console.error('Search error:', error);
    searchResults.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Search failed</div>
        <div class="empty-description">Please try again later</div>
      </div>
    `;
  }
}

function displaySearchResults(players) {
  searchResults.innerHTML = players.slice(0, 8).map(player => `
    <div class="search-result-item" onclick="viewPlayer('${player.id || player.polaris_id}')">
      <div class="search-result-avatar">${getInitial(player.name || player.username)}</div>
      <div class="search-result-info">
        <div class="search-result-name">${esc(player.name || player.username || 'Unknown')}</div>
        <div class="search-result-meta">
          <span>${esc(player.tekken_name || player.character || 'Unknown')}</span>
          <span>•</span>
          <span>${formatNumber(player.power || player.prowess || 0)} Prowess</span>
        </div>
      </div>
      <div class="search-result-badge">
        ${player.rank || player.dan_rank || 'Unknown Rank'}
      </div>
    </div>
  `).join('');
}

function searchPlayer(name) {
  searchInput.value = name;
  performSearch(name);
}

// Load top players
async function loadTopPlayers() {
  try {
    const response = await fetch(`${EWGF_API}/leaderboard?limit=12`);
    const data = await response.json();
    
    if (data && data.data) {
      displayPlayerCards(data.data);
    }
  } catch (error) {
    console.error('Failed to load players:', error);
    document.getElementById('playersContainer').innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load players</div>
        <div class="empty-description">Please refresh the page to try again</div>
      </div>
    `;
  }
}

function displayPlayerCards(players) {
  const container = document.getElementById('playersContainer');
  container.innerHTML = players.map(player => {
    const wins = player.wins || 0;
    const losses = player.losses || 1;
    const winRate = Math.round((wins / (wins + losses)) * 100);
    
    return `
      <div class="player-card" onclick="viewPlayer('${player.id || player.polaris_id}')">
        <div class="player-card-header">
          <div class="player-card-avatar">${getInitial(player.name || player.username)}</div>
          <div class="player-card-info">
            <div class="player-card-name">${esc(player.name || player.username || 'Unknown')}</div>
            <div class="player-card-rank">${esc(player.rank || player.dan_rank || 'Unknown Rank')}</div>
          </div>
        </div>
        <div class="player-card-stats">
          <div class="player-card-stat">
            <div class="player-card-stat-value">${formatNumber(player.power || player.prowess || 0)}</div>
            <div class="player-card-stat-label">Prowess</div>
          </div>
          <div class="player-card-stat">
            <div class="player-card-stat-value">${winRate}%</div>
            <div class="player-card-stat-label">Win Rate</div>
          </div>
          <div class="player-card-stat">
            <div class="player-card-stat-value">${wins + losses}</div>
            <div class="player-card-stat-label">Matches</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function viewPlayer(id) {
  window.location.href = `./player-v2.html?id=${encodeURIComponent(id)}`;
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toString();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function getInitial(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}

// Close search results when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) {
    searchResults.style.display = 'none';
  }
});

// Load initial data
loadTopPlayers();
</script>

</body>
</html>
