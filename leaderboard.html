<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Leaderboard - Tekathon</title>
<link rel="stylesheet" href="./assets/styles/design-system.css">
<style>
.filters-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-xl);
}

.filters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-md);
}

.filter-group label {
  display: block;
  font-size: var(--text-sm);
  font-weight: var(--font-semibold);
  color: var(--text-secondary);
  margin-bottom: var(--space-sm);
}

.filter-select {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.filter-select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

.leaderboard-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.table-header {
  display: grid;
  grid-template-columns: 80px 1fr 140px 120px 100px;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  background: var(--bg-tertiary);
  border-bottom: 2px solid var(--border);
  font-size: var(--text-xs);
  font-weight: var(--font-bold);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
}

.table-row {
  display: grid;
  grid-template-columns: 80px 1fr 140px 120px 100px;
  gap: var(--space-md);
  align-items: center;
  padding: var(--space-lg);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.table-row:last-child {
  border-bottom: none;
}

.table-row:hover {
  background: var(--surface-hover);
}

.rank-cell {
  font-weight: var(--font-extrabold);
  font-size: var(--text-2xl);
  color: var(--text-secondary);
  text-align: center;
}

.rank-cell.top3 {
  background: var(--rank-god-supreme);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: var(--text-3xl);
}

.player-cell {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  min-width: 0;
}

.player-avatar {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-extrabold);
  font-size: var(--text-xl);
  flex-shrink: 0;
}

.player-info {
  flex: 1;
  min-width: 0;
}

.player-name {
  font-weight: var(--font-bold);
  font-size: var(--text-lg);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 4px;
}

.player-character {
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.rank-badge {
  padding: var(--space-sm) var(--space-md);
  background: var(--primary-glow);
  border-radius: var(--radius-md);
  font-weight: var(--font-bold);
  font-size: var(--text-sm);
  color: var(--primary-light);
  text-align: center;
}

.prowess-cell {
  font-weight: var(--font-extrabold);
  font-family: var(--font-mono);
  font-size: var(--text-xl);
  color: var(--primary);
}

.winrate-cell {
  text-align: right;
  font-weight: var(--font-bold);
}

.winrate-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin-top: 6px;
}

.winrate-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: var(--radius-full);
}

.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: var(--space-md);
  margin-top: var(--space-xl);
}

.page-btn {
  min-width: 40px;
  padding: 10px 16px;
}

@media (max-width: 768px) {
  .table-header, .table-row {
    grid-template-columns: 60px 1fr 100px;
  }
  .rank-badge, .winrate-cell { display: none; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-container">
    <a href="./index-v2.html" class="nav-logo">
      <div class="nav-logo-icon">T</div>
      <span>Tekathon</span>
    </a>
    <div class="nav-links">
      <a href="./index-v2.html" class="nav-link">Home</a>
      <a href="./search-v2.html" class="nav-link">Search</a>
      <a href="./leaderboard-v2.html" class="nav-link active">Leaderboards</a>
      <a href="./analytics-v2.html" class="nav-link">Analytics</a>
    </div>
  </div>
</nav>

<section class="container" style="padding-top: var(--space-3xl);">
  <div class="section-header">
    <div>
      <h1 class="section-title">Global Leaderboard</h1>
      <p class="section-subtitle">Top TEKKEN 8 players ranked by prowess</p>
    </div>
  </div>

  <div class="filters-bar">
    <div class="filters-grid">
      <div class="filter-group">
        <label>Region</label>
        <select class="filter-select" id="regionFilter">
          <option value="">All Regions</option>
          <option value="asia">Asia</option>
          <option value="europe">Europe</option>
          <option value="north-america">North America</option>
          <option value="south-america">South America</option>
          <option value="oceania">Oceania</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Character</label>
        <select class="filter-select" id="characterFilter">
          <option value="">All Characters</option>
          <option value="kazuya">Kazuya</option>
          <option value="jin">Jin</option>
          <option value="devil-jin">Devil Jin</option>
          <option value="reina">Reina</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Minimum Rank</label>
        <select class="filter-select" id="rankFilter">
          <option value="">All Ranks</option>
          <option value="tekken-god-supreme">Tekken God Supreme</option>
          <option value="tekken-god">Tekken God</option>
          <option value="god-of-destruction">God of Destruction</option>
        </select>
      </div>
      <div style="display: flex; align-items: flex-end;">
        <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
      </div>
    </div>
  </div>

  <div class="leaderboard-table">
    <div class="table-header">
      <div>Rank</div>
      <div>Player</div>
      <div>Current Rank</div>
      <div>Prowess</div>
      <div>Win Rate</div>
    </div>
    <div id="leaderboardBody">
      <!-- Loading -->
    </div>
  </div>

  <div class="pagination">
    <button class="btn btn-ghost page-btn" id="prevBtn" onclick="prevPage()">←</button>
    <span id="pageInfo" class="text-secondary">Page 1</span>
    <button class="btn btn-ghost page-btn" id="nextBtn" onclick="nextPage()">→</button>
  </div>
</section>

<script>
const EWGF_API = 'https://www.ewgf.gg/api';
let currentPage = 0;
const pageSize = 50;

async function loadLeaderboard() {
  const container = document.getElementById('leaderboardBody');
  container.innerHTML = '<div style="padding: var(--space-3xl); text-align: center; color: var(--text-secondary);">Loading...</div>';

  try {
    const response = await fetch(`${EWGF_API}/leaderboard?limit=${pageSize}&offset=${currentPage * pageSize}`);
    const data = await response.json();

    if (data && data.data && data.data.length > 0) {
      displayLeaderboard(data.data);
      updatePagination(data.data.length);
    }
  } catch (error) {
    console.error('Failed to load leaderboard:', error);
    container.innerHTML = '<div style="padding: var(--space-3xl); text-align: center; color: var(--text-secondary);">Failed to load data</div>';
  }
}

function displayLeaderboard(players) {
  const container = document.getElementById('leaderboardBody');
  container.innerHTML = players.map((player, idx) => {
    const rank = currentPage * pageSize + idx + 1;
    const wins = player.wins || 0;
    const losses = player.losses || 1;
    const winRate = Math.round((wins / (wins + losses)) * 100);

    return `
      <div class="table-row" onclick="viewPlayer('${player.id || player.polaris_id}')">
        <div class="rank-cell ${rank <= 3 ? 'top3' : ''}">#${rank}</div>
        <div class="player-cell">
          <div class="player-avatar">${getInitial(player.name || player.username)}</div>
          <div class="player-info">
            <div class="player-name">${esc(player.name || player.username || 'Unknown')}</div>
            <div class="player-character">${esc(player.tekken_name || player.character || 'Unknown')}</div>
          </div>
        </div>
        <div class="rank-badge">${esc(player.rank || player.dan_rank || 'Unknown')}</div>
        <div class="prowess-cell">${formatNumber(player.power || player.prowess || 0)}</div>
        <div class="winrate-cell">
          ${winRate}%
          <div class="winrate-bar">
            <div class="winrate-fill" style="width: ${winRate}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function updatePagination(count) {
  document.getElementById('pageInfo').textContent = `Page ${currentPage + 1}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = count < pageSize;
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    loadLeaderboard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function nextPage() {
  currentPage++;
  loadLeaderboard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
  currentPage = 0;
  loadLeaderboard();
}

function viewPlayer(id) {
  window.location.href = `./player-v2.html?id=${encodeURIComponent(id)}`;
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toString();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function getInitial(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}

loadLeaderboard();
</script>

</body>
</html>
