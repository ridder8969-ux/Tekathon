<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profile - Tekathon</title>
<link rel="stylesheet" href="./assets/styles/design-system.css">
<style>
.profile-header {
  background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-primary) 100%);
  padding: var(--space-3xl) 0;
  border-bottom: 1px solid var(--border);
}

.profile-main {
  display: flex;
  align-items: center;
  gap: var(--space-2xl);
  margin-bottom: var(--space-xl);
}

.profile-avatar {
  width: 120px;
  height: 120px;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-extrabold);
  font-size: 3rem;
  flex-shrink: 0;
  box-shadow: var(--shadow-glow);
}

.profile-info {
  flex: 1;
}

.profile-name {
  font-size: var(--text-4xl);
  font-weight: var(--font-extrabold);
  margin-bottom: var(--space-sm);
}

.profile-meta {
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  flex-wrap: wrap;
  margin-bottom: var(--space-md);
}

.profile-rank {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: var(--primary-glow);
  border-radius: var(--radius-md);
  font-weight: var(--font-bold);
  color: var(--primary-light);
}

.profile-character {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-weight: var(--font-semibold);
}

.profile-prowess {
  font-size: var(--text-2xl);
  font-weight: var(--font-extrabold);
  color: var(--primary);
  font-family: var(--font-mono);
}

.stats-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--space-lg);
  margin: var(--space-2xl) 0;
}

.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  text-align: center;
}

.stat-box-value {
  font-size: var(--text-3xl);
  font-weight: var(--font-extrabold);
  color: var(--primary);
  margin-bottom: var(--space-sm);
}

.stat-box-label {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: var(--font-semibold);
}

.stat-box-sub {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  margin-top: 4px;
}

.content-tabs {
  display: flex;
  gap: var(--space-md);
  border-bottom: 2px solid var(--border);
  margin-bottom: var(--space-xl);
}

.tab {
  padding: var(--space-md) var(--space-lg);
  color: var(--text-secondary);
  font-weight: var(--font-semibold);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition-fast);
}

.tab:hover {
  color: var(--text-primary);
}

.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.match-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.match-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: var(--space-lg);
  align-items: center;
  transition: all var(--transition-fast);
}

.match-card:hover {
  border-color: var(--border-light);
  background: var(--surface-hover);
}

.match-result {
  width: 80px;
  height: 80px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: var(--font-extrabold);
  font-size: var(--text-2xl);
  flex-shrink: 0;
}

.match-result.win {
  background: var(--success-bg);
  color: var(--success);
}

.match-result.loss {
  background: var(--error-bg);
  color: var(--error);
}

.match-details {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.match-opponent {
  font-weight: var(--font-bold);
  font-size: var(--text-lg);
}

.match-meta {
  display: flex;
  gap: var(--space-md);
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.match-stats {
  text-align: right;
}

.match-score {
  font-size: var(--text-2xl);
  font-weight: var(--font-extrabold);
  margin-bottom: 4px;
}

.match-date {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
}

@media (max-width: 768px) {
  .profile-main {
    flex-direction: column;
    text-align: center;
  }
  .profile-meta {
    justify-content: center;
  }
  .match-card {
    grid-template-columns: 1fr;
    text-align: center;
  }
  .match-result {
    margin: 0 auto;
  }
  .match-stats {
    text-align: center;
  }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-container">
    <a href="./index-v2.html" class="nav-logo">
      <div class="nav-logo-icon">T</div>
      <span>Tekathon</span>
    </a>
    <div class="nav-links">
      <a href="./index-v2.html" class="nav-link">Home</a>
      <a href="./search-v2.html" class="nav-link">Search</a>
      <a href="./leaderboard-v2.html" class="nav-link">Leaderboards</a>
      <a href="./analytics-v2.html" class="nav-link">Analytics</a>
    </div>
  </div>
</nav>

<div class="profile-header">
  <div class="container">
    <div class="profile-main" id="profileMain">
      <div class="skeleton" style="width: 120px; height: 120px; border-radius: var(--radius-xl);"></div>
      <div style="flex: 1;">
        <div class="skeleton" style="width: 200px; height: 40px; margin-bottom: var(--space-md);"></div>
        <div class="skeleton" style="width: 300px; height: 20px;"></div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="stats-overview" id="statsOverview">
    <!-- Loading skeletons -->
    <div class="stat-box">
      <div class="skeleton" style="width: 80px; height: 40px; margin: 0 auto var(--space-sm);"></div>
      <div class="skeleton" style="width: 120px; height: 16px; margin: 0 auto;"></div>
    </div>
  </div>

  <div class="content-tabs">
    <div class="tab active" onclick="switchTab('matches')">Match History</div>
    <div class="tab" onclick="switchTab('stats')">Detailed Stats</div>
    <div class="tab" onclick="switchTab('achievements')">Achievements</div>
  </div>

  <div id="matchesTab" class="tab-content active">
    <div id="matchHistory" class="match-list">
      <!-- Loading skeleton -->
      <div class="match-card">
        <div class="skeleton" style="width: 80px; height: 80px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="width: 100%; height: 60px;"></div>
        <div class="skeleton" style="width: 80px; height: 60px;"></div>
      </div>
    </div>
  </div>

  <div id="statsTab" class="tab-content">
    <div class="grid grid-3">
      <div class="card">
        <h3 class="text-lg font-bold mb-md">Performance</h3>
        <div id="performanceStats">Loading...</div>
      </div>
      <div class="card">
        <h3 class="text-lg font-bold mb-md">Character Usage</h3>
        <div id="characterStats">Loading...</div>
      </div>
      <div class="card">
        <h3 class="text-lg font-bold mb-md">Recent Form</h3>
        <div id="recentForm">Loading...</div>
      </div>
    </div>
  </div>

  <div id="achievementsTab" class="tab-content">
    <div class="grid grid-4">
      <div class="card text-center">
        <div class="text-4xl mb-sm">🏆</div>
        <div class="text-2xl font-bold mb-xs">Top 100</div>
        <div class="text-sm text-secondary">Global Ranking</div>
      </div>
      <div class="card text-center">
        <div class="text-4xl mb-sm">🔥</div>
        <div class="text-2xl font-bold mb-xs">10 Win</div>
        <div class="text-sm text-secondary">Streak</div>
      </div>
      <div class="card text-center">
        <div class="text-4xl mb-sm">⚡</div>
        <div class="text-2xl font-bold mb-xs">1000+</div>
        <div class="text-sm text-secondary">Matches Played</div>
      </div>
      <div class="card text-center">
        <div class="text-4xl mb-sm">👑</div>
        <div class="text-2xl font-bold mb-xs">God</div>
        <div class="text-sm text-secondary">Rank Achieved</div>
      </div>
    </div>
  </div>
</div>

<script>
const EWGF_API = 'https://www.ewgf.gg/api';
const urlParams = new URLSearchParams(window.location.search);
const playerId = urlParams.get('id');

async function loadPlayer() {
  if (!playerId) {
    window.location.href = './search-v2.html';
    return;
  }

  try {
    const response = await fetch(`${EWGF_API}/player/${playerId}`);
    const data = await response.json();
    
    if (data && data.data) {
      displayProfile(data.data);
      loadMatches(playerId);
    }
  } catch (error) {
    console.error('Failed to load player:', error);
    document.getElementById('profileMain').innerHTML = `
      <div class="empty-state">
        <div class="empty-title">Player not found</div>
        <div class="empty-description">Please try searching for another player</div>
        <a href="./search-v2.html" class="btn btn-primary mt-lg">Back to Search</a>
      </div>
    `;
  }
}

function displayProfile(player) {
  const wins = player.wins || 0;
  const losses = player.losses || 1;
  const total = wins + losses;
  const winRate = Math.round((wins / total) * 100);
  
  document.title = `${player.name || player.username} - Tekathon`;
  
  document.getElementById('profileMain').innerHTML = `
    <div class="profile-avatar">${getInitial(player.name || player.username)}</div>
    <div class="profile-info">
      <h1 class="profile-name">${esc(player.name || player.username || 'Unknown')}</h1>
      <div class="profile-meta">
        <div class="profile-rank">${esc(player.rank || player.dan_rank || 'Unknown Rank')}</div>
        <div class="profile-character">🥋 ${esc(player.tekken_name || player.character || 'Unknown')}</div>
        <div class="profile-prowess">${formatNumber(player.power || player.prowess || 0)} Prowess</div>
      </div>
    </div>
  `;
  
  document.getElementById('statsOverview').innerHTML = `
    <div class="stat-box">
      <div class="stat-box-value">${wins}</div>
      <div class="stat-box-label">Wins</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-value">${losses}</div>
      <div class="stat-box-label">Losses</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-value">${winRate}%</div>
      <div class="stat-box-label">Win Rate</div>
      <div class="stat-box-sub">${wins}W - ${losses}L</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-value">${total}</div>
      <div class="stat-box-label">Total Matches</div>
    </div>
  `;
}

async function loadMatches(playerId) {
  try {
    const response = await fetch(`${EWGF_API}/player/${playerId}/matches`);
    const data = await response.json();
    
    if (data && data.data && data.data.length > 0) {
      displayMatches(data.data);
    } else {
      document.getElementById('matchHistory').innerHTML = `
        <div class="empty-state">
          <div class="empty-title">No matches found</div>
          <div class="empty-description">Match history will appear here</div>
        </div>
      `;
    }
  } catch (error) {
    console.error('Failed to load matches:', error);
    document.getElementById('matchHistory').innerHTML = `
      <div class="empty-state">
        <div class="empty-title">Unable to load matches</div>
        <div class="empty-description">Please try again later</div>
      </div>
    `;
  }
}

function displayMatches(matches) {
  document.getElementById('matchHistory').innerHTML = matches.slice(0, 20).map(match => {
    const isWin = match.result === 'win' || match.won;
    const score = `${match.player_score || 0} - ${match.opponent_score || 0}`;
    
    return `
      <div class="match-card">
        <div class="match-result ${isWin ? 'win' : 'loss'}">
          ${isWin ? 'WIN' : 'LOSS'}
        </div>
        <div class="match-details">
          <div class="match-opponent">vs ${esc(match.opponent_name || 'Unknown')}</div>
          <div class="match-meta">
            <span>${esc(match.opponent_character || 'Unknown')}</span>
            <span>•</span>
            <span>${esc(match.stage || 'Unknown Stage')}</span>
          </div>
        </div>
        <div class="match-stats">
          <div class="match-score">${score}</div>
          <div class="match-date">${formatDate(match.date || match.played_at)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tab + 'Tab').classList.add('active');
}

function formatDate(dateStr) {
  if (!dateStr) return 'Unknown';
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7) return `${days} days ago`;
  return date.toLocaleDateString();
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toString();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function getInitial(name) {
  return name ? name.charAt(0).toUpperCase() : '?';
}

loadPlayer();
</script>

</body>
</html>
